version: "3.9"

services:
  nginx:
    image: nginx:latest
    container_name: text-transfer-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /home/ywk/code/text-transfer/frontend:/usr/share/nginx/html:ro
      - /home/ywk/code/text-transfer/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /home/ywk/code/text-transfer/nginx/logs:/var/log/nginx
      - /home/ywk/code/text-transfer/nginx/certs:/etc/nginx/certs:ro
